<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Sorgulama</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .search-box {
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .result {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        .result.var {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .result.yok {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .book-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .book-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .textarea-section {
            margin: 20px 0;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        .stats {
            background: #e9ecef;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Kitap Sorgulama</h1>
        <div class="subtitle">Kitap adını yaz, bende var mı hemen öğren!</div>
        
        <div class="stats" id="stats">
            Yükleniyor...
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Kitap adını yaz..." autocomplete="off">
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="textarea-section">
            <h3>📖 Kitaplarım (her satıra bir kitap adı)</h3>
            <textarea id="bookList" rows="10" placeholder="Örneğin:
1984 - George Orwell
Suc ve Ceza
Don Kişot
Kürk Mantolu Madonna"></textarea>
            <button onclick="saveBooks()">💾 Kitapları Kaydet</button>
            <button onclick="loadExample()">📝 Örnek Yükle</button>
        </div>
        
        <div class="book-list" id="bookListDisplay"></div>
    </div>

    <script>
        let books = [];
        
        // Sayfa yüklenince kayıtlı kitapları getir
        window.onload = function() {
            loadBooks();
            document.getElementById('searchInput').addEventListener('input', searchBook);
        };
        
        function loadBooks() {
            const saved = localStorage.getItem('myBooks');
            if(saved) {
                books = JSON.parse(saved);
                document.getElementById('bookList').value = books.join('\n');
            } else {
                // Örnek kitaplar
                books = ['1984 - George Orwell', 'Suç ve Ceza', 'Don Kişot', 'Kürk Mantolu Madonna'];
                document.getElementById('bookList').value = books.join('\n');
            }
            updateDisplay();
        }
        
        function saveBooks() {
            const text = document.getElementById('bookList').value;
            books = text.split('\n').filter(line => line.trim().length > 0);
            localStorage.setItem('myBooks', JSON.stringify(books));
            updateDisplay();
            showMessage('✅ Kitaplar kaydedildi!', 'success');
        }
        
        function loadExample() {
            books = ['1984 - George Orwell', 'Suç ve Ceza', 'Don Kişot', 'Kürk Mantolu Madonna', 'Sapiens', 'Hayvan Çiftliği'];
            document.getElementById('bookList').value = books.join('\n');
            saveBooks();
        }
        
        function updateDisplay() {
            const display = document.getElementById('bookListDisplay');
            display.innerHTML = '<h3>📚 Sahip olduğum kitaplar (' + books.length + ' kitap)</h3>';
            books.forEach(book => {
                display.innerHTML += '<div class="book-item">📖 ' + book + '</div>';
            });
            
            document.getElementById('stats').innerHTML = `📊 Toplam ${books.length} kitabınız var`;
        }
        
        function searchBook() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result');
            
            if(query === '') {
                resultDiv.innerHTML = '';
                resultDiv.className = 'result';
                return;
            }
            
            // Tam eşleşme ve kısmi eşleşme kontrolü
            const found = books.find(book => book.toLowerCase().includes(query));
            
            if(found) {
                resultDiv.innerHTML = `✅ " ${query} " Bende VAR! (${found})`;
                resultDiv.className = 'result var';
            } else {
                resultDiv.innerHTML = `❌ " ${query} " Bende YOK!`;
                resultDiv.className = 'result yok';
            }
        }
        
        function showMessage(msg, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = msg;
            resultDiv.className = type === 'success' ? 'result var' : 'result yok';
            setTimeout(() => {
                if(document.getElementById('searchInput').value === '') {
                    resultDiv.innerHTML = '';
                }
            }, 2000);
        }
    </script>
</body>
</html>
