<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 Kardo'nun Kitaplığı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 24px;
            max-width: 350px;
            width: 90%;
            text-align: center;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .badge {
            display: inline-block;
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .search-box {
            margin: 20px 0;
        }
        
        .search-box input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .result {
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.var {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        
        .result.yok {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        
        .stats-number {
            font-size: 48px;
            font-weight: bold;
        }
        
        .add-book {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .add-book input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button.danger {
            background: #dc3545;
        }
        
        button.success {
            background: #28a745;
        }
        
        button.secondary {
            background: #6c757d;
        }
        
        .book-item {
            background: #f8f9fa;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .delete-btn {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .sync-status {
            font-size: 12px;
            text-align: center;
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .sync-status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .sync-status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .sync-status.sync {
            background: #fff3cd;
            color: #856404;
        }
        
        .admin-only {
            border-top: 2px solid #e0e0e0;
            margin-top: 20px;
            padding-top: 20px;
        }
        
        .lock-icon {
            cursor: pointer;
            font-size: 20px;
            margin-left: 10px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: monospace;
            margin: 10px 0;
        }
        
        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <h2>🔐 Giriş Yap</h2>
                <p style="color:#666; margin:10px 0">Bu uygulama Kardo'ya özeldir</p>
                <input type="text" id="username" placeholder="Kullanıcı Adı" autocomplete="off">
                <input type="password" id="password" placeholder="Şifre">
                <button onclick="login()" style="width:100%; margin-top:10px">Giriş Yap</button>
                <p style="margin-top:15px; font-size:12px; color:#999">🔍 Kitap sorgulama herkese açık</p>
            </div>
        </div>
        
        <div id="mainApp" style="display:none;">
            <div class="card">
                <div class="header">
                    <h1>📚 Kardo'nun Kitaplığı</h1>
                    <span class="lock-icon" onclick="logout()" title="Çıkış Yap">🔓</span>
                </div>
                <div class="badge">☁️ Google Sheets ile senkron | 🔐 Korumalı</div>
            </div>
            
            <div class="stats">
                <div class="stats-number" id="bookCount">0</div>
                <div>kitabınız var</div>
            </div>
            
            <div class="card">
                <h3>🔍 Kitap Sorgula</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Kitap adını yaz, hemen öğren..." autocomplete="off">
                </div>
                <div id="result" class="result"></div>
            </div>
            
            <div class="card" id="adminPanel">
                <h3>➕ Yeni Kitap Ekle</h3>
                <div class="add-book">
                    <input type="text" id="newBook" placeholder="Kitap adı..." autocomplete="off">
                    <button onclick="addSingleBook()">Ekle</button>
                </div>
                
                <div class="admin-only">
                    <h3>📝 Toplu Yönetim</h3>
                    <textarea id="bookList" rows="6" placeholder="Her satıra bir kitap adı..."></textarea>
                    <button onclick="saveAllBooks()" class="success">💾 Tümünü Kaydet</button>
                    <button onclick="loadFromCloud()">🔄 Yenile</button>
                    
                    <div class="quick-buttons">
                        <button onclick="addExample()" class="secondary">📖 Örnek Kitaplar</button>
                        <button onclick="clearAll()" class="danger">🗑️ Tümünü Temizle</button>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>📖 Kitaplarım</h3>
                <div id="booksList"></div>
            </div>
            
            <div id="syncStatus" class="sync-status success">✅ Hazır</div>
        </div>
    </div>

    <script>
        // 🔴 BURAYA YENİ APPS SCRIPT URL'NİZİ YAPIŞTIRIN
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-BxuOuPhPSgU7kAThIPnKN3yhxANY2Ii42fRr5KqtwMOOgommdZ1ER025QHYi3TX6Gw/exec';
        
        const VALID_USERNAME = 'Kardo';
        const VALID_PASSWORD = '616161';
        
        let books = [];
        let isLoggedIn = false;
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if(username === VALID_USERNAME && password === VALID_PASSWORD) {
                isLoggedIn = true;
                localStorage.setItem('kitap_auth', 'true');
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadFromCloud();
                setupEventListeners();
            } else {
                alert('❌ Hatalı kullanıcı adı veya şifre!');
            }
        }
        
        function logout() {
            isLoggedIn = false;
            localStorage.removeItem('kitap_auth');
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
        
        function checkAutoLogin() {
            const savedAuth = localStorage.getItem('kitap_auth');
            if(savedAuth === 'true') {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadFromCloud();
                setupEventListeners();
            }
        }
        
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', searchBook);
            document.getElementById('newBook').addEventListener('keypress', function(e) {
                if(e.key === 'Enter') addSingleBook();
            });
        }
        
        async function loadFromCloud() {
            showSync('🔄 Buluttan kitaplar çekiliyor...', 'sync');
            
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                
                if(data.success && data.books) {
                    books = data.books;
                    showSync(`✅ ${data.count} kitap senkronize edildi`, 'success');
                } else {
                    throw new Error(data.error || 'Veri alınamadı');
                }
                
                updateUI();
                
            } catch(error) {
                console.error('Hata:', error);
                showSync(`❌ Bulut bağlantı hatası: ${error.message}`, 'error');
                
                // Yedekten yükle
                const saved = localStorage.getItem('books_backup');
                if(saved && saved !== 'undefined') {
                    books = JSON.parse(saved);
                    showSync('⚠️ Yerel yedekten yüklendi', 'error');
                } else {
                    books = ['1984 - George Orwell', 'Suç ve Ceza', 'Don Kişot', 'Kürk Mantolu Madonna'];
                    showSync('📱 Demo mod - Kitaplar yerel olarak kaydedilecek', 'error');
                }
                updateUI();
            }
        }
        
        async function saveToCloud(bookList) {
            showSync('💾 Buluta kaydediliyor...', 'sync');
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Apps Script için no-cors gerekli
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        books: bookList,
                        user: 'Kardo'
                    })
                });
                
                // Local backup her zaman yap
                localStorage.setItem('books_backup', JSON.stringify(bookList));
                showSync('✅ Yerel olarak kaydedildi', 'success');
                
                // 2 saniye sonra tekrar çek
                setTimeout(() => loadFromCloud(), 2000);
                
            } catch(error) {
                console.error('Save error:', error);
                showSync(`⚠️ Yerel olarak kaydedildi (bulut hatası)`, 'error');
                localStorage.setItem('books_backup', JSON.stringify(bookList));
                updateUI();
            }
        }
        
        async function addSingleBook() {
            if(!isLoggedIn) {
                alert('🔐 Kitap eklemek için giriş yapmalısınız!');
                return;
            }
            
            const input = document.getElementById('newBook');
            const bookName = input.value.trim();
            
            if(!bookName) {
                alert('Lütfen bir kitap adı girin!');
                return;
            }
            
            if(books.find(b => b.toLowerCase() === bookName.toLowerCase())) {
                alert('⚠️ Bu kitap zaten listenizde var!');
                return;
            }
            
            books.push(bookName);
            await saveToCloud(books);
            input.value = '';
            input.focus();
        }
        
        async function deleteBook(index) {
            if(!isLoggedIn) {
                alert('🔐 Kitap silmek için giriş yapmalısınız!');
                return;
            }
            
            if(confirm(`${books[index]} kitabını silmek istediğinize emin misiniz?`)) {
                books.splice(index, 1);
                await saveToCloud(books);
            }
        }
        
        async function saveAllBooks() {
            if(!isLoggedIn) {
                alert('🔐 Bu işlem için giriş yapmalısınız!');
                return;
            }
            
            const text = document.getElementById('bookList').value;
            const newBooks = text.split('\n').filter(line => line.trim().length > 0);
            books = newBooks;
            await saveToCloud(books);
        }
        
        function addExample() {
            if(!isLoggedIn) {
                alert('🔐 Bu işlem için giriş yapmalısınız!');
                return;
            }
            
            books = [
                '1984 - George Orwell',
                'Suç ve Ceza - Dostoyevski',
                'Don Kişot - Cervantes',
                'Kürk Mantolu Madonna - Sabahattin Ali',
                'Sapiens - Yuval Noah Harari',
                'Hayvan Çiftliği - George Orwell'
            ];
            saveToCloud(books);
        }
        
        async function clearAll() {
            if(!isLoggedIn) {
                alert('🔐 Bu işlem için giriş yapmalısınız!');
                return;
            }
            
            if(confirm('🔥 TÜM KİTAPLARI silmek istediğinize EMİN misiniz?')) {
                books = [];
                await saveToCloud(books);
            }
        }
        
        function updateUI() {
            document.getElementById('bookList').value = books.join('\n');
            document.getElementById('bookCount').innerText = books.length;
            
            const booksListDiv = document.getElementById('booksList');
            if(books.length === 0) {
                booksListDiv.innerHTML = '<p style="color:#999; text-align:center; padding:20px;">📭 Henüz kitap eklenmemiş</p>';
            } else {
                booksListDiv.innerHTML = books.map((book, index) => `
                    <div class="book-item">
                        <span>📖 ${escapeHtml(book)}</span>
                        ${isLoggedIn ? `<button class="delete-btn" onclick="deleteBook(${index})">🗑️ Sil</button>` : ''}
                    </div>
                `).join('');
            }
        }
        
        function searchBook() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result');
            
            if(query === '') {
                resultDiv.innerHTML = '';
                resultDiv.className = 'result';
                return;
            }
            
            const exactMatch = books.find(book => book.toLowerCase() === query);
            const partialMatch = books.find(book => book.toLowerCase().includes(query));
            const found = exactMatch || partialMatch;
            
            if(found) {
                resultDiv.innerHTML = `
                    <div>✅ <strong>"${escapeHtml(query)}"</strong> bende VAR!</div>
                    <small style="opacity:0.8;">📖 ${escapeHtml(found)}</small>
                `;
                resultDiv.className = 'result var';
            } else {
                resultDiv.innerHTML = `
                    <div>❌ <strong>"${escapeHtml(query)}"</strong> bende YOK!</div>
                    <small style="opacity:0.8;">📚 Kitapçıya sorman gerek 😊</small>
                `;
                resultDiv.className = 'result yok';
            }
        }
        
        function showSync(msg, type) {
            const statusDiv = document.getElementById('syncStatus');
            statusDiv.innerHTML = msg;
            statusDiv.className = `sync-status ${type}`;
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        window.onload = function() {
            checkAutoLogin();
        };
    </script>
</body>
</html>
